<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Type-To-Face</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="top" class="app homePage">
      <!-- Site navigation stays quiet so the animated wordmark remains the main event. -->
      <header class="siteHeader">
        <nav class="siteNav" aria-label="Primary navigation">
          <a class="wordmark" href="index.html" aria-label="Type-To-Face home"
            >Type-To-Face</a
          >
          <div class="navLinks">
            <a href="index.html" aria-current="page">Home</a>
            <a href="about.html">About</a>
            <a href="process.html">Process</a>
            <a href="examples.html">Examples</a>
            <a href="render.html">Renderer</a>
          </div>
        </nav>
      </header>

      <main class="homeMain">
        <!-- The canvas mount is unchanged; src/home.js still owns the animated title. -->
        <section class="hero" aria-labelledby="heroTitle">
          <canvas
            id="heroAscii"
            class="heroCanvas"
            aria-label="Animated ASCII wordmark reading Face-To-Type"
          ></canvas>
          <div class="heroContent">
            <h1 id="heroTitle" class="srOnly">Face-To-Type</h1>
            <a class="heroCta" href="render.html">Continue to App</a>
          </div>
        </section>
      </main>

      <!-- Compact project context without turning the homepage into a marketing page. -->
      <footer class="siteFooter">
        <div class="footerInner">
          <p class="footerTitle">Type-To-Face</p>
          <p id="project-process" class="footerMeta">
            Copyright © 2026 Leo Hennessy. All Rights Reserved.
          </p>
        </div>
      </footer>
    </div>

    <script type="module" src="src/home.js"></script>
  </body>
</html>
