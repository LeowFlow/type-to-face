<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Face-To-Type</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero" aria-labelledby="heroTitle">
        <canvas id="heroAscii" class="heroCanvas" aria-label="Animated ASCII wordmark reading Face-To-Type"></canvas>

          <h1 id="heroTitle" class="srOnly">Face-To-Type</h1>
          <p class="heroKicker">Webcam typography renderer</p>

    <script type="module" src="src/home.js"></script>
