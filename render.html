<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Face-To-Type Renderer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="siteHeader">
        <nav class="siteNav" aria-label="Primary navigation">
          <a class="wordmark" href="index.html" aria-label="Face-To-Type home"
            >Type-To-Face</a
          >
          <div class="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="process.html">Process</a>
            <a href="examples.html">Examples</a>
            <a href="render.html" aria-current="page">Renderer</a>
          </div>
        </nav>
      </header>

      <main>
        <section
          id="studio"
          class="studio studioStandalone"
          aria-labelledby="studioTitle"
        >

          <section class="layout rendererLayout">
            <section class="stageColumn">
              <section class="stage">
                <div class="canvasWrap">
                  <canvas id="output" aria-label="ASCII camera output"></canvas>
                </div>
                <video id="video" autoplay playsinline muted></video>
                <p id="status" class="status">Camera idle.</p>
                <p id="stats" class="stats"></p>
              </section>

              <section class="toolbar" aria-label="Input controls">
                <button id="start" class="primary">Start camera</button>
                <label class="uploadControl">
                  <span>Upload image</span>
                  <input id="imageUpload" type="file" accept="image/*" />
                </label>
                <div class="imageTools" aria-label="Image view controls">
                  <button id="imageZoomOut" disabled>Zoom -</button>
                  <button id="imageZoomReset" disabled>Reset view</button>
                  <button id="imageZoomIn" disabled>Zoom +</button>
                </div>
                <button id="pause" disabled>Pause</button>
                <button id="snapshot" disabled>Snapshot PNG</button>
                <button id="reset">Reset to Defaults</button>
              </section>

            </section>

            <aside class="controls" aria-label="Renderer configuration">
              <div class="controlsHeader">
                <h2>Settings</h2>
                <p>Expand a group to adjust the renderer.</p>
              </div>

              <details class="settingsSection" open>
                <summary>Layout &amp; Type</summary>
                <div class="settingsSectionBody">
                  <label class="control">
                    <span>Cell size</span>
                    <input id="cellSize" type="range" min="6" max="24" step="1" />
                    <output id="cellSizeOut"></output>
                  </label>

                  <div class="control">
                    <span>Auto columns / rows</span>
                    <output id="gridOut">-</output>
                  </div>

                  <label class="control">
                    <span>Line height</span>
                    <input
                      id="lineHeight"
                      type="range"
                      min="0.8"
                      max="1.4"
                      step="0.01"
                    />
                    <output id="lineHeightOut"></output>
                  </label>

                  <label class="control">
                    <span>Tracking</span>
                    <input
                      id="tracking"
                      type="range"
                      min="-0.5"
                      max="1"
                      step="0.05"
                    />
                    <output id="trackingOut"></output>
                  </label>

                  <label class="control">
                    <span>Font family</span>
                    <input id="fontFamily" type="text" />
                  </label>

                  <label class="control">
                    <span>Font weight</span>
                    <input
                      id="fontWeight"
                      type="range"
                      min="300"
                      max="900"
                      step="100"
                    />
                    <output id="fontWeightOut"></output>
                  </label>

                  <label class="control">
                    <span>Font size mode</span>
                    <select id="fontSizeMode">
                      <option value="auto">Auto</option>
                      <option value="manual">Manual</option>
                    </select>
                  </label>

                  <label class="control">
                    <span>Font size (manual)</span>
                    <input id="fontSize" type="range" min="6" max="32" step="1" />
                    <output id="fontSizeOut"></output>
                  </label>
                </div>
              </details>

              <details class="settingsSection">
                <summary>Glyph Mapping</summary>
                <div class="settingsSectionBody">
                  <label class="control">
                    <span>Glyph ramp preset</span>
                    <select id="glyphRampPreset"></select>
                  </label>

                  <label class="control">
                    <span>Custom ramp (dense to sparse)</span>
                    <input id="customRamp" type="text" placeholder="@%#*+=-:. " />
                  </label>

                  <label class="control inline">
                    <input id="invert" type="checkbox" />
                    <span>Invert density</span>
                  </label>
                </div>
              </details>

              <details class="settingsSection">
                <summary>Tone &amp; Detail</summary>
                <div class="settingsSectionBody">
                  <label class="control">
                    <span>Brightness</span>
                    <input
                      id="brightness"
                      type="range"
                      min="-100"
                      max="100"
                      step="1"
                    />
                    <output id="brightnessOut"></output>
                  </label>

                  <label class="control">
                    <span>Contrast</span>
                    <input
                      id="contrast"
                      type="range"
                      min="50"
                      max="200"
                      step="1"
                    />
                    <output id="contrastOut"></output>
                  </label>

                  <label class="control">
                    <span>Gamma</span>
                    <input
                      id="gamma"
                      type="range"
                      min="0.4"
                      max="2.4"
                      step="0.01"
                    />
                    <output id="gammaOut"></output>
                  </label>

                  <label class="control">
                    <span>Exposure</span>
                    <input
                      id="exposure"
                      type="range"
                      min="-2"
                      max="2"
                      step="0.05"
                    />
                    <output id="exposureOut"></output>
                  </label>

                  <label class="control">
                    <span>Threshold (0 = off)</span>
                    <input
                      id="threshold"
                      type="range"
                      min="0"
                      max="255"
                      step="1"
                    />
                    <output id="thresholdOut"></output>
                  </label>

                  <label class="control inline">
                    <input id="smoothing" type="checkbox" />
                    <span>Sampling smoothing</span>
                  </label>

                  <label class="control">
                    <span>Detail boost</span>
                    <input
                      id="detailBoost"
                      type="range"
                      min="0"
                      max="100"
                      step="1"
                    />
                    <output id="detailBoostOut"></output>
                  </label>
                </div>
              </details>

              <details class="settingsSection">
                <summary>Color &amp; Runtime</summary>
                <div class="settingsSectionBody">
                  <label class="control">
                    <span>Color mode</span>
                    <select id="colourMode">
                      <option value="average">Per-cell average</option>
                      <option value="off">Off</option>
                      <option value="palette">Palette quantized</option>
                    </select>
                  </label>

                  <label class="control">
                    <span>Palette preset</span>
                    <select id="palettePreset"></select>
                  </label>

                  <label class="control">
                    <span>Palette strength</span>
                    <input
                      id="paletteStrength"
                      type="range"
                      min="0"
                      max="100"
                      step="1"
                    />
                    <output id="paletteStrengthOut"></output>
                  </label>

                  <label class="control inline">
                    <input id="mirror" type="checkbox" />
                    <span>Mirror</span>
                  </label>

                  <label class="control">
                    <span>FPS cap</span>
                    <select id="fpsCap">
                      <option value="15">15</option>
                      <option value="30">30</option>
                      <option value="60">60</option>
                    </select>
                  </label>

                  <label class="control inline">
                    <input id="adaptiveResolution" type="checkbox" />
                    <span>Adaptive resolution</span>
                  </label>
                </div>
              </details>
            </aside>
          </section>
        </section>
      </main>

      <footer class="siteFooter">
        <div class="footerInner">
          <p class="footerTitle">Face-To-Type</p>
          <p class="footerMeta">
            Copyright © 2026 Leo Hennessy. All Rights Reserved.
          </p>
        </div>
      </footer>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
